name: RunPod Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger-runpod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger RunPod deploy
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_DEPLOY_WEBHOOK_URL: ${{ secrets.RUNPOD_DEPLOY_WEBHOOK_URL }}
          RUNPOD_GRAPHQL_MUTATION: ${{ secrets.RUNPOD_GRAPHQL_MUTATION }}
          RUNPOD_GRAPHQL_VARIABLES_JSON: ${{ secrets.RUNPOD_GRAPHQL_VARIABLES_JSON }}
          IMAGE_URI: ""
          IMAGE_LATEST: ""
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python3 scripts/deploy_runpod.py

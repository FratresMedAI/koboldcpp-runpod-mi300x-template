name: RunPod Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.out.outputs.image_uri }}
      image_latest: ${{ steps.out.outputs.image_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free disk space
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          echo "Disk usage after cleanup:"
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: meta
        run: |
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          no-cache: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:sha-${{ github.sha }}

      - name: Emit image outputs
        id: out
        run: |
          echo "image_uri=${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:latest" >> "$GITHUB_OUTPUT"

  trigger-runpod:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger RunPod deploy
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_DEPLOY_WEBHOOK_URL: ${{ secrets.RUNPOD_DEPLOY_WEBHOOK_URL }}
          RUNPOD_GRAPHQL_MUTATION: ${{ secrets.RUNPOD_GRAPHQL_MUTATION }}
          RUNPOD_GRAPHQL_VARIABLES_JSON: ${{ secrets.RUNPOD_GRAPHQL_VARIABLES_JSON }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          IMAGE_LATEST: ${{ needs.build-and-push.outputs.image_latest }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python3 scripts/deploy_runpod.py
